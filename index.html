<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint Poker - Auswahl</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toast" id="toast"></div>

<div class="screen active" id="screenMode">
  <div class="mode-screen">
    <div class="mode-suits">♠ ♥ ♦ ♣</div>
    <h1 class="mode-title">Sprint Poker</h1>
    <div class="mode-cards">
      <div class="mode-card" id="btnClassicMode">
        <div class="mode-icon">🃏</div>
        <h2>Klassisch</h2>
        <p>Einfaches Planning Poker — jeder schätzt, Host deckt auf, Auswertung mit Durchschnitt & Agreement.</p>
        <div class="mode-badge">Standard</div>
      </div>
      <div class="mode-card" id="btnCasinoMode">
        <div class="mode-icon">♠</div>
        <h2>Casino</h2>
        <p>Chip-Einsätze, The House als Gegner, Gewinner kriegt Bonus-Chips — Sprint Planning mit Spielcharakter.</p>
        <div class="mode-badge">Game Mode</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
